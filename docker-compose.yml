services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cdlhub
      POSTGRES_PASSWORD: cdlhub
      POSTGRES_DB: cdlhub
    ports:
      - "54329:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdlhub"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
